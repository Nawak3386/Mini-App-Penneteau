<!DOCTYPE html>
<html lang="fr">
<head>

    a{display:inline-flex;align-items:center;justify-content:center;min-height:52px;padding:0 22px;border-radius:16px;background:white;color:#111827;font-weight:900;text-decoration:none}
  </style>
</head>
<body>
  <main>
    <img src="apple-touch-icon.png" alt="Penneteau">

    <a id="openApp" href="#">Ouvrir l'application</a>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbwBFRaRvZCHn4GHQlqiqg5LxnRGEGN5wND8OScfO5HYXOAb0OD_8FLMpxmFYnHTgRQ5/exec";

    const openApp = document.getElementById("openApp");
    openApp.href = APP_URL;
  </script>

</html>

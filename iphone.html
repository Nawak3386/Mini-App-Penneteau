<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Penneteau</title>

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="apple-touch-icon.png">

  <meta name="apple-mobile-web-app-title" content="Penneteau">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 420px;
      width: 100%;
      background: #1c1c1e;
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    p {
      color: #d1d1d6;
      font-size: 17px;
      line-height: 1.4;
      margin-bottom: 28px;
    }

    a {
      display: block;
      background: #e30613;
      color: white;
      text-decoration: none;
      font-weight: 700;
      padding: 16px 20px;
      border-radius: 18px;
      font-size: 18px;
    }

    .hint {
      margin-top: 22px;
      font-size: 14px;
      color: #a1a1a6;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="apple-touch-icon.png" alt="Logo Penneteau">

    <h1>Penneteau</h1>

    <p>
      Ajoute cette page à l'écran d'accueil de ton iPhone pour utiliser l'icône personnalisée.
    </p>

    <a href="https://script.google.com/macros/s/AKfycbwBFRaRvZCHn4GHQlqiqg5LxnRGEGN5wND8OScfO5HYXOAb0OD_8FLMpxmFYnHTgRQ5/exec">
      Ouvrir l'application
    </a>

    <div class="hint">
      Sur iPhone : Partager -> Ajouter à l'écran d'accueil
    </div>
  </div>
</body>
</html>
